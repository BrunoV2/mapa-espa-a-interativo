<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>España — Mapa Interactivo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:            #edeae2;
  --surface:       #f7f5f0;
  --border:        #d8d4cb;
  --region:        #c5bfb4;
  --region-stroke: #edeae2;
  --hover:         #b8976a;
  --selected:      #8c5e30;
  --accent:        #b8763a;
  --text:          #28221c;
  --text-mid:      #6b5e53;
  --text-muted:    #a09080;
  --inset-bg:      #e5e1d8;
}

html, body {
  height: 100%;
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

header {
  padding: 20px 40px 8px;
  display: flex;
  align-items: baseline;
  gap: 18px;
  border-bottom: 1px solid var(--border);
}

.h-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
}

.h-sub {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
}

.layout {
  display: flex;
  height: calc(100vh - 68px);
}

#map-wrap {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

#loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
}

#loading.hidden { display: none; }

#main-svg {
  display: block;
  width: 100%;
  height: 100%;
}

.region {
  fill: var(--region);
  stroke: var(--region-stroke);
  stroke-width: 1.2;
  cursor: pointer;
  transition: fill 0.18s ease, filter 0.18s ease;
}

.region:hover { fill: var(--hover); filter: drop-shadow(0 2px 8px rgba(100,60,20,.18)); }
.region.active { fill: var(--selected); filter: drop-shadow(0 3px 12px rgba(80,40,10,.22)); }

.region-canarias {
  fill: var(--region);
  stroke: var(--region-stroke);
  stroke-width: 1;
  cursor: pointer;
  transition: fill 0.18s ease;
}
.region-canarias:hover { fill: var(--hover); }
.region-canarias.active { fill: var(--selected); }

.inset-box {
  fill: var(--inset-bg);
  stroke: var(--border);
  stroke-width: 1;
  rx: 4;
}

.inset-label {
  font-family: 'Outfit', sans-serif;
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  fill: var(--text-muted);
}

.tooltip {
  position: absolute;
  background: var(--text);
  color: #fff;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.5px;
  padding: 6px 12px;
  border-radius: 3px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  white-space: nowrap;
  transform: translate(-50%, -110%);
}

.tooltip.show { opacity: 1; }

#panel {
  width: 280px;
  min-width: 280px;
  padding: 36px 32px 36px 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-left: 1px solid var(--border);
  background: var(--surface);
}

.p-empty {
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 300;
  line-height: 1.8;
  letter-spacing: 0.3px;
}

.p-empty strong {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--text-mid);
  margin-bottom: 8px;
}

#p-content { display: none; }
#p-content.show { display: block; }

.p-num {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}

.p-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 700;
  line-height: 1.05;
  color: var(--text);
  margin-bottom: 20px;
}

.p-bar {
  width: 40px;
  height: 2px;
  background: var(--accent);
  margin-bottom: 22px;
  border-radius: 1px;
}

.p-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px 12px;
  margin-bottom: 22px;
}

.p-item label {
  display: block;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 3px;
}

.p-item span {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}

.p-desc {
  font-size: 12.5px;
  font-weight: 300;
  line-height: 1.75;
  color: var(--text-mid);
  border-top: 1px solid var(--border);
  padding-top: 18px;
}

.hint-bar {
  position: absolute;
  bottom: 20px;
  left: 28px;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
}
</style>
</head>
<body>

<header>
  <span class="h-title">España</span>
  <span class="h-sub">Comunidades Autónomas · Mapa Interactivo</span>
</header>

<div class="layout">
  <div id="map-wrap">
    <div id="loading">Cargando mapa…</div>
    <svg id="main-svg"></svg>
    <div class="tooltip" id="tooltip"></div>
    <div class="hint-bar">← Haz clic en una comunidad</div>
  </div>

  <div id="panel">
    <div class="p-empty">
      <strong>Selecciona una región</strong>
      Haz clic sobre cualquier<br>comunidad autónoma<br>para ver sus datos.
    </div>
    <div id="p-content">
      <div class="p-num" id="p-num"></div>
      <div class="p-name" id="p-name"></div>
      <div class="p-bar"></div>
      <div class="p-grid">
        <div class="p-item"><label>Capital</label><span id="p-cap"></span></div>
        <div class="p-item"><label>Superficie</label><span id="p-area"></span></div>
        <div class="p-item"><label>Población</label><span id="p-pop"></span></div>
        <div class="p-item"><label>Provincias</label><span id="p-prov"></span></div>
      </div>
      <div class="p-desc" id="p-desc"></div>
    </div>
  </div>
</div>

<script>
const DATA = {

  // # Andalucía
  'Andalucía': {
    n:'01', cap:'Sevilla', area:'87.268 km²', pop:'8,5M hab.', prov:'8',
    desc:'La comunidad más extensa de España. Cuna del flamenco, hogar de la Alhambra de Granada, la Mezquita de Córdoba y la Giralda de Sevilla.'
  },

  // # Aragón
  'Aragón': {
    n:'02', cap:'Zaragoza', area:'47.719 km²', pop:'1,3M hab.', prov:'3',
    desc:'Entre los Pirineos, el Moncayo y el Ebro. Tierra natal de Goya y del espectacular Arte Mudéjar declarado Patrimonio de la Humanidad.'
  },

  // # Asturias
  'Asturias': {
    n:'03', cap:'Oviedo', area:'10.604 km²', pop:'1,0M hab.', prov:'1',
    desc:'El Paraíso Natural de España. Costa cantábrica, Picos de Europa, sidra asturiana, fabada y cuna de la Reconquista española.'
  },

  // # Islas Baleares
  'Islas Baleares': {
    n:'04', cap:'Palma', area:'4.992 km²', pop:'1,2M hab.', prov:'1',
    desc:'Archipiélago mediterráneo con Mallorca, Menorca, Ibiza y Formentera. Sol, playa, cultura talayótica y destino turístico de primer orden.'
  },

  // # Canarias
  'Canarias': {
    n:'05', cap:'Las Palmas / S.C. Tenerife', area:'7.493 km²', pop:'2,2M hab.', prov:'2',
    desc:'Archipiélago volcánico en el Atlántico. Siete islas con clima subtropical, el Teide y paisajes únicos entre dunas, laurisilva y caldera.'
  },

  // # Cantabria
  'Cantabria': {
    n:'06', cap:'Santander', area:'5.321 km²', pop:'583K hab.', prov:'1',
    desc:'Costa verde del Cantábrico con las cuevas de Altamira, los Picos de Europa, el Valle de Liébana y gastronomía de alto nivel.'
  },

  // # Castilla-La Mancha
  'Castilla-La Mancha': {
    n:'07', cap:'Toledo', area:'79.463 km²', pop:'2,1M hab.', prov:'5',
    desc:'La tierra del Quijote. Toledo, ciudad Patrimonio de la Humanidad, los molinos de viento de La Mancha y las llanuras castellanas.'
  },

  // # Castilla y León
  'Castilla y León': {
    n:'08', cap:'Valladolid', area:'94.227 km²', pop:'2,4M hab.', prov:'9',
    desc:'La región interior más grande de la Unión Europea. Salamanca, Burgos, León, Segovia y Ávila conforman un patrimonio histórico incomparable.'
  },

  // # Cataluña
  'Cataluña': {
    n:'09', cap:'Barcelona', area:'32.091 km²', pop:'7,8M hab.', prov:'4',
    desc:'Dinámica comunidad del noreste. Barcelona, la Sagrada Família, los Pirineos catalanes, la Costa Brava y una identidad cultural propia y fuerte.'
  },

  // # Extremadura
  'Extremadura': {
    n:'10', cap:'Mérida', area:'41.634 km²', pop:'1,1M hab.', prov:'2',
    desc:'Tierra de conquistadores. Mérida alberga el mayor conjunto monumental romano de España. También destaca el parque natural de Monfragüe.'
  },

  // # Galicia
  'Galicia': {
    n:'11', cap:'Santiago de Compostela', area:'29.575 km²', pop:'2,7M hab.', prov:'4',
    desc:'El verde rincón atlántico de España. Destino final del Camino de Santiago, con las Rías Baixas, la gastronomía marinera y la gaita gallega.'
  },

  // # La Rioja
  'La Rioja': {
    n:'12', cap:'Logroño', area:'5.045 km²', pop:'320K hab.', prov:'1',
    desc:'La comunidad más pequeña de la península y capital mundial del vino. Sus bodegas, la Rioja Alta y el Camino de Santiago son sus señas de identidad.'
  },

  // # Comunidad de Madrid
  'Comunidad de Madrid': {
    n:'13', cap:'Madrid', area:'8.028 km²', pop:'6,8M hab.', prov:'1',
    desc:'Corazón político y cultural de España. El Prado, el Thyssen, el Reina Sofía, la Puerta del Sol y el Bernabéu concentran arte, historia y deporte.'
  },

  // # Región de Murcia
  'Región de Murcia': {
    n:'14', cap:'Murcia', area:'11.314 km²', pop:'1,5M hab.', prov:'1',
    desc:'La huerta de Europa. El Mar Menor, la romana Cartagena y una de las mayores producciones hortofrutícolas del continente europeo.'
  },

  // # Navarra
  'Navarra': {
    n:'15', cap:'Pamplona', area:'10.391 km²', pop:'660K hab.', prov:'1',
    desc:'Comunidad foral con carácter propio. Los Sanfermines de Pamplona, el Camino de Santiago y una geografía que va de los Pirineos al Ebro.'
  },

  // # País Vasco
  'País Vasco': {
    n:'16', cap:'Vitoria-Gasteiz', area:'7.234 km²', pop:'2,2M hab.', prov:'3',
    desc:'Euskadi. Bilbao y el Guggenheim, San Sebastián como capital gastronómica mundial, el euskera milenario y una identidad cultural muy marcada.'
  },

  // # Comunidad Valenciana
  'Comunidad Valenciana': {
    n:'17', cap:'Valencia', area:'23.255 km²', pop:'5,1M hab.', prov:'3',
    desc:'Tierra de sol, paella y las Fallas. Valencia, tercera ciudad de España, combina arte gótico, arquitectura vanguardista y el Mediterráneo a sus pies.'
  }
};

const ALIASES = {
  'Andalusia':'Andalucía','Aragon':'Aragón',
  'Balearic Islands':'Islas Baleares','Illes Balears':'Islas Baleares',
  'Canary Islands':'Canarias','Islas Canarias':'Canarias',
  'Castile-La Mancha':'Castilla-La Mancha',
  'Castile and León':'Castilla y León','Castilla - La Mancha':'Castilla-La Mancha',
  'Catalonia':'Cataluña','Catalunya':'Cataluña',
  'Madrid':'Comunidad de Madrid','Community of Madrid':'Comunidad de Madrid',
  'Murcia':'Región de Murcia','Region of Murcia':'Región de Murcia',
  'Navarre':'Navarra',
  'Basque Country':'País Vasco','Euskadi':'País Vasco',
  'Valencian Community':'Comunidad Valenciana','Valencia':'Comunidad Valenciana',
  'Valencian Community':'Comunidad Valenciana'
};

function resolveName(props) {
  const raw = props.nombre || props.name || props.Name || props.NAME || '';
  return ALIASES[raw] || raw;
}

const tooltip = document.getElementById('tooltip');
const mapWrap = document.getElementById('map-wrap');
let activeEl = null;

function showPanel(nombre) {
  const d = DATA[nombre];
  document.querySelector('.p-empty').style.display = 'none';
  const pc = document.getElementById('p-content');
  pc.classList.add('show');
  document.getElementById('p-num').textContent = d ? `Comunidad ${d.n} de 17` : '';
  document.getElementById('p-name').textContent = nombre;
  document.getElementById('p-cap').textContent  = d ? d.cap  : '—';
  document.getElementById('p-area').textContent = d ? d.area : '—';
  document.getElementById('p-pop').textContent  = d ? d.pop  : '—';
  document.getElementById('p-prov').textContent = d ? d.prov : '—';
  document.getElementById('p-desc').textContent = d ? d.desc : '';
}

async function init() {
  const url = 'https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/spain-communities.geojson';
  let geo;
  try {
    const res = await fetch(url);
    geo = await res.json();
  } catch(e) {
    document.getElementById('loading').textContent = 'Error al cargar el mapa. Requiere conexión a internet.';
    return;
  }

  document.getElementById('loading').classList.add('hidden');

  const svg = d3.select('#main-svg');
  const wrap = document.getElementById('map-wrap');
  const W = wrap.clientWidth - 48;
  const H = wrap.clientHeight - 48;

  svg.attr('viewBox', `0 0 ${W} ${H}`).attr('width', W).attr('height', H);

  // Separate Canarias from peninsula
  const peninsulaFeatures = geo.features.filter(f => {
    const n = resolveName(f.properties);
    return n !== 'Canarias';
  });
  const canariasFeatures = geo.features.filter(f => resolveName(f.properties) === 'Canarias');

  const peninsulaGeo = { type:'FeatureCollection', features: peninsulaFeatures };

  // Main projection for peninsula
  const insetW = W * 0.30;
  const insetH = H * 0.28;
  const insetX = 10;
  const insetY = H - insetH - 16;

  const projMain = d3.geoMercator().fitSize([W - insetW - 20, H], peninsulaGeo);
  const pathMain = d3.geoPath().projection(projMain);

  // Canarias projection for inset
  const canariasGeo = { type:'FeatureCollection', features: canariasFeatures };
  const projCan = d3.geoMercator().fitSize([insetW - 12, insetH - 20], canariasGeo);
  const pathCan = d3.geoPath().projection(projCan);

  // Inset box
  if (canariasFeatures.length > 0) {
    svg.append('rect')
      .attr('class','inset-box')
      .attr('x', insetX).attr('y', insetY)
      .attr('width', insetW).attr('height', insetH)
      .attr('rx', 4).attr('ry', 4);

    svg.append('text')
      .attr('class','inset-label')
      .attr('x', insetX + 8).attr('y', insetY + insetH - 7)
      .text('Islas Canarias');

    const gCan = svg.append('g')
      .attr('transform', `translate(${insetX + 6}, ${insetY + 6})`);

    gCan.selectAll('path')
      .data(canariasFeatures)
      .join('path')
      .attr('class','region-canarias')
      .attr('d', pathCan)
      .on('mouseenter', function(event) {
        d3.select(this).raise();
        const n = resolveName(d3.select(this).datum().properties);
        tooltip.textContent = n;
        tooltip.classList.add('show');
      })
      .on('mousemove', function(event) {
        const rect = mapWrap.getBoundingClientRect();
        tooltip.style.left = (event.clientX - rect.left) + 'px';
        tooltip.style.top  = (event.clientY - rect.top)  + 'px';
      })
      .on('mouseleave', function() {
        tooltip.classList.remove('show');
      })
      .on('click', function(event, d) {
        if (activeEl) d3.select(activeEl).classed('active', false);
        d3.select(this).classed('active', true);
        activeEl = this;
        showPanel(resolveName(d.properties));
      });
  }

  // Peninsula regions
  const gMain = svg.append('g');

  gMain.selectAll('path')
    .data(peninsulaFeatures)
    .join('path')
    .attr('class','region')
    .attr('d', pathMain)
    .on('mouseenter', function(event, d) {
      d3.select(this).raise();
      tooltip.textContent = resolveName(d.properties);
      tooltip.classList.add('show');
    })
    .on('mousemove', function(event) {
      const rect = mapWrap.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left) + 'px';
      tooltip.style.top  = (event.clientY - rect.top)  + 'px';
    })
    .on('mouseleave', function() {
      tooltip.classList.remove('show');
    })
    .on('click', function(event, d) {
      if (activeEl) d3.select(activeEl).classed('active', false);
      d3.select(this).classed('active', true);
      activeEl = this;
      showPanel(resolveName(d.properties));
    });
}

init();
</script>
</body>
</html>
